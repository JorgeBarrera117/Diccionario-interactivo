<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/img/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolverX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://unpkg.com/mathlive"></script>
</head>
<body>
  <header class="sticky-top bg-surface" style="padding: 0.5rem 1rem; border-bottom: 1px solid var(--md-sys-color-surface-container-highest, #E6E0E9);">
    <nav class="navbar navbar-expand-lg px-2 gap-3" style="background: transparent;">
      <button class="btn btn-icon d-flex align-items-center justify-content-center m3-icon-btn" id="sidebarToggle" type="button" aria-label="Toggle sidebar" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
        <span class="material-symbols-rounded fs-5 text-on-surface-variant">history</span>
      </button>
      <a class="navbar-brand fw-bold text-primary d-none d-sm-inline m-0" href="#">
        <img src="assets/img/logo.png" alt="SolverX Logo" height="24" class="align-middle me-1" style="border-radius: 4px;"> SolverX
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navSections" aria-controls="navSections" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navSections">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1 ms-lg-3">
          <li class="nav-item">
            <button class="nav-link active section-tab m3-nav-pill" data-section="dictionary">
              <span class="material-symbols-rounded">menu_book</span> Diccionario
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="translate">
              <span class="material-symbols-rounded">translate</span> Traductor
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="favorites">
              <span class="material-symbols-rounded">favorite_border</span> Favoritos
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="math">
              <span class="material-symbols-rounded">calculate</span> Matemáticas
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="physics">
              <span class="material-symbols-rounded">rocket_launch</span> Física
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="chemistry">
              <span class="material-symbols-rounded">science</span> Química
            </button>
          </li>
        </ul>

        <div class="nav-item me-2 d-none d-md-flex align-items-center">
          <button class="btn m3-icon-btn-outlined d-flex align-items-center justify-content-center" id="themeToggle" title="Cambiar tema">
            <span class="material-symbols-rounded" id="themeIcon" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
              </button>
            </div>
      </div>
    </nav>
  </header>

  <div class="container-fluid pt-3">
    <div class="row">
      <main class="col-12 col-lg-10 col-xl-8 mx-auto p-3 p-md-5" id="mainContent" style="padding-bottom: 100px !important;">
        <div id="dictionarySection">
          <div class="search-hero d-flex flex-column align-items-center w-100 mb-4">
            <form id="searchForm" class="search-form w-100 d-flex flex-column align-items-center" autocomplete="off" onsubmit="return false;">
              <div class="d-flex w-100 gap-2 align-items-center justify-content-center" style="max-width: 800px;">
                
                <div class="dropdown">
                  <button class="m3-filter-chip d-flex align-items-center gap-1 bg-surface-container" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="langToggle" style="height: 56px; border-radius: 28px; padding: 0 16px; border: 1px solid var(--md-sys-color-outline);">
                    <span id="currentLangLabel">🇺🇸 EN</span> <span class="material-symbols-rounded" style="font-size: 1.2rem;">arrow_drop_down</span>
                  </button>
                  <ul class="dropdown-menu shadow" id="langDropdown" style="border-radius: 12px; border: 1px solid var(--md-sys-color-outline);">
                    <li><button type="button" class="dropdown-item lang-option d-flex align-items-center gap-2" data-lang="en">🇺🇸 English</button></li>
                    <li><button type="button" class="dropdown-item lang-option d-flex align-items-center gap-2" data-lang="es">🇪🇸 Español</button></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><button type="button" class="dropdown-item lang-option d-flex align-items-center gap-2" data-lang="fr">🇫🇷 Français</button></li>
                    <li><button type="button" class="dropdown-item lang-option d-flex align-items-center gap-2" data-lang="de">🇩🇪 Deutsch</button></li>
                    <li><button type="button" class="dropdown-item lang-option d-flex align-items-center gap-2" data-lang="it">🇮🇹 Italiano</button></li>
                    <li><button type="button" class="dropdown-item lang-option d-flex align-items-center gap-2" data-lang="pt">🇵🇹 Português</button></li>
                  </ul>
                </div>

                <div class="m3-search-bar-container flex-grow-1 position-relative">
                  <div class="m3-search-bar d-flex align-items-center px-3" style="height: 56px; border-radius: 28px; background: var(--md-sys-color-surface-container-high, #ECE6F0); transition: all 0.2s;">
                    <span class="material-symbols-rounded" style="color: var(--md-sys-color-on-surface-variant, #49454F); font-size: 24px;">search</span>
                    <input type="text" class="search-input bg-transparent border-0 flex-grow-1 ms-3" name="word" placeholder='Buscar una palabra...' style="outline: none; color: var(--md-sys-color-on-surface, #1C1B1F); font-size: 16px; min-width: 0;" />
                    <button type="button" class="btn btn-icon rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; color: var(--md-sys-color-on-surface-variant);">
                      <span class="material-symbols-rounded">mic</span>
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div id="wordOfDaySection"></div>
          <div id="loadingSection" class="text-center py-5 d-none">
            <div class="spinner-border text-indigo" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>
          <div id="errorSection" class="d-none"></div>
          <div id="resultSection"></div>
          <div id="emptyState" class="text-center py-5 text-body-tertiary">
            <span class="material-symbols-rounded fs-1">search</span>
            <p class="mt-2 fs-5" id="emptyStateText">Busca cualquier palabra para ver su definición</p>
            <p class="small" id="emptyStateHint">Ej: dog, house, love, tree, book</p>
          </div>
        </div>
        <div id="translateSection" class="d-none"></div>
        <div id="favoritesSection" class="d-none"></div>
        <div id="mathSection" class="d-none"></div>
        <div id="physicsSection" class="d-none"></div>
        <div id="chemistrySection" class="d-none"></div>
      </main>
    </div>
  </div>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold text-primary"><img src="assets/img/logo.png" alt="SolverX Logo" height="24" class="align-middle me-1" style="border-radius: 4px;"> SolverX</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>
    <div class="offcanvas-body" id="offcanvasSidebarContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjs@12.2.1/lib/browser/math.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
