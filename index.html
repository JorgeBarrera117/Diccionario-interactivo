<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%236366f1'%3E%3Cpath d='M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783'/%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolverX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://unpkg.com/mathlive"></script>
</head>
<body>
  <header class="sticky-top bg-surface" style="padding: 0.5rem 1rem; border-bottom: 1px solid var(--md-sys-color-surface-container-highest, #E6E0E9);">
    <nav class="navbar navbar-expand-lg px-2 gap-3" style="background: transparent;">
      <button class="btn btn-icon d-flex align-items-center justify-content-center m3-icon-btn" id="sidebarToggle" type="button" aria-label="Toggle sidebar" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
        <span class="material-symbols-rounded fs-5 text-on-surface-variant">history</span>
      </button>
      <a class="navbar-brand fw-bold text-primary d-none d-sm-inline m-0" href="#">
        <span class="material-symbols-rounded align-middle">category</span> SolverX
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navSections" aria-controls="navSections" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navSections">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1 ms-lg-3">
          <li class="nav-item">
            <button class="nav-link active section-tab m3-nav-pill" data-section="dictionary">
              <span class="material-symbols-rounded">menu_book</span> Diccionario
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="translate">
              <span class="material-symbols-rounded">translate</span> Traductor
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="favorites">
              <span class="material-symbols-rounded">favorite_border</span> Favoritos
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="math">
              <span class="material-symbols-rounded">calculate</span> Matemáticas
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="physics">
              <span class="material-symbols-rounded">rocket_launch</span> Física
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab m3-nav-pill" data-section="chemistry">
              <span class="material-symbols-rounded">science</span> Química
            </button>
          </li>
        </ul>

        <div class="nav-item me-2 d-none d-md-flex align-items-center">
          <button class="btn m3-icon-btn-outlined d-flex align-items-center justify-content-center" id="themeToggle" title="Cambiar tema">
            <span class="material-symbols-rounded" id="themeIcon" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
              </button>
            </div>
      </div>
    </nav>
  </header>

  <div class="container-fluid pt-3">
    <div class="row">
      <main class="col-12 col-lg-10 col-xl-8 mx-auto p-3 p-md-5 vh-100 overflow-auto" id="mainContent" style="padding-bottom: 100px !important;">
        <div id="dictionarySection">
          <div class="search-hero">
            <form id="searchForm" class="search-form" autocomplete="off">
              <div class="search-bar">
                <span class="material-symbols-rounded search-icon">search</span>
                <input type="text" class="search-input" name="word" placeholder='Buscar una palabra en inglés...' />
                <button class="btn btn-indigo search-btn" type="submit">Buscar</button>
              </div>
            </form>
            <div class="lang-picker-toolbar">
              <div class="dropdown">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle d-flex align-items-center gap-1" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="langToggle">
                  <span class="material-symbols-rounded">language</span> <span id="currentLangLabel">English</span>
                </button>
                <ul class="dropdown-menu" id="langDropdown">
                  <li><button class="dropdown-item lang-option" data-lang="en"><span class="material-symbols-rounded me-2 lang-check"id="checkEn">check</span>English</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="es"><span class="material-symbols-rounded me-2 lang-check"id="checkEs">check</span>Español (RAE)</button></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><button class="dropdown-item lang-option" data-lang="fr"><span class="material-symbols-rounded me-2 lang-check"id="checkFr">check</span>Français</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="de"><span class="material-symbols-rounded me-2 lang-check"id="checkDe">check</span>Deutsch</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="it"><span class="material-symbols-rounded me-2 lang-check"id="checkIt">check</span>Italiano</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="pt"><span class="material-symbols-rounded me-2 lang-check"id="checkPt">check</span>Português</button></li>
                </ul>
              </div>
            </div>
          </div>
          <div id="wordOfDaySection"></div>
          <div id="loadingSection" class="text-center py-5 d-none">
            <div class="spinner-border text-indigo" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>
          <div id="errorSection" class="d-none"></div>
          <div id="resultSection"></div>
          <div id="emptyState" class="text-center py-5 text-body-tertiary">
            <span class="material-symbols-rounded fs-1">search</span>
            <p class="mt-2 fs-5" id="emptyStateText">Busca cualquier palabra para ver su definición</p>
            <p class="small" id="emptyStateHint">Ej: dog, house, love, tree, book</p>
          </div>
        </div>
        <div id="translateSection" class="d-none"></div>
        <div id="favoritesSection" class="d-none"></div>
        <div id="mathSection" class="d-none"></div>
        <div id="physicsSection" class="d-none"></div>
        <div id="chemistrySection" class="d-none"></div>
      </main>
    </div>
  </div>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold text-primary"><span class="material-symbols-rounded align-middle">category</span> SolverX</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>
    <div class="offcanvas-body" id="offcanvasSidebarContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjs@12.2.1/lib/browser/math.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
