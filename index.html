<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diccionario Interactivo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <header class="border-bottom sticky-top bg-body-tertiary">
    <nav class="navbar navbar-expand-lg px-3 gap-2">
      <button class="btn btn-outline-secondary border-0 d-lg-none p-2" id="sidebarToggle" type="button" aria-label="Toggle sidebar">
        <i class="bi bi-list fs-5"></i>
      </button>
      <a class="navbar-brand fw-bold text-indigo d-none d-sm-inline" href="#">
        <i class="bi bi-book"></i> Diccionario
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navSections" aria-controls="navSections" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navSections">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <button class="nav-link active section-tab" data-section="dictionary">
              <i class="bi bi-book"></i> Diccionario
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab" data-section="translate">
              <i class="bi bi-translate"></i> Traductor
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link section-tab" data-section="favorites">
              <i class="bi bi-heart"></i> Favoritos
            </button>
          </li>
        </ul>

        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary border-0 p-2" id="themeToggle" type="button" aria-label="Toggle theme">
            <i class="bi bi-moon-fill fs-5"></i>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <div class="container-fluid">
    <div class="row">
      <aside class="col-lg-3 col-xl-2 border-end vh-100 d-none d-lg-block p-0 overflow-auto bg-body-tertiary" id="sidebar">
        <div class="p-3">
          <div id="sidebarContent"></div>
        </div>
      </aside>
      <main class="col-lg-9 col-xl-10 p-4 vh-100 overflow-auto" id="mainContent">
        <div id="dictionarySection">
          <div class="search-hero">
            <form id="searchForm" class="search-form" autocomplete="off">
              <div class="search-bar">
                <i class="bi bi-search search-icon"></i>
                <input type="text" class="search-input" name="word" placeholder='Buscar una palabra en inglés...' />
                <button class="btn btn-indigo search-btn" type="submit">Buscar</button>
              </div>
            </form>
            <div class="lang-picker-toolbar">
              <div class="dropdown">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle d-flex align-items-center gap-1" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="langToggle">
                  <i class="bi bi-globe2"></i> <span id="currentLangLabel">English</span>
                </button>
                <ul class="dropdown-menu" id="langDropdown">
                  <li><button class="dropdown-item lang-option" data-lang="en"><i class="bi bi-check-lg me-2 lang-check" id="checkEn"></i>English</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="es"><i class="bi bi-check-lg me-2 lang-check" id="checkEs"></i>Español (RAE)</button></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><button class="dropdown-item lang-option" data-lang="fr"><i class="bi bi-check-lg me-2 lang-check" id="checkFr"></i>Français</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="de"><i class="bi bi-check-lg me-2 lang-check" id="checkDe"></i>Deutsch</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="it"><i class="bi bi-check-lg me-2 lang-check" id="checkIt"></i>Italiano</button></li>
                  <li><button class="dropdown-item lang-option" data-lang="pt"><i class="bi bi-check-lg me-2 lang-check" id="checkPt"></i>Português</button></li>
                </ul>
              </div>
            </div>
          </div>
          <div id="wordOfDaySection"></div>
          <div id="loadingSection" class="text-center py-5 d-none">
            <div class="spinner-border text-indigo" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>
          <div id="errorSection" class="d-none"></div>
          <div id="resultSection"></div>
          <div id="emptyState" class="text-center py-5 text-body-tertiary">
            <i class="bi bi-search fs-1"></i>
            <p class="mt-2 fs-5" id="emptyStateText">Busca cualquier palabra para ver su definición</p>
            <p class="small" id="emptyStateHint">Ej: dog, house, love, tree, book</p>
          </div>
        </div>
        <div id="translateSection" class="d-none"></div>
        <div id="favoritesSection" class="d-none"></div>
      </main>
    </div>
  </div>

  <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="sidebarOffcanvas">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title"><i class="bi bi-book"></i> Diccionario</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>
    <div class="offcanvas-body" id="offcanvasSidebarContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
